name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' 
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🔍 TypeScript check
        run: npx tsc --noEmit

      - name: 🏗️ Build
        run: npm run build
        env:
          VITE_WEBHOOK_URL: ${{ secrets.VITE_WEBHOOK_URL }}
          VITE_ADMIN_WEBHOOK_URL: ${{ secrets.VITE_ADMIN_WEBHOOK_URL }}
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_DISCORD_COMMUNITY_URL: ${{ secrets.VITE_DISCORD_COMMUNITY_URL }}
          VITE_DISCORD_FORUM_URL: ${{ secrets.VITE_DISCORD_FORUM_URL }}
          VITE_TWITTER_URL: ${{ secrets.VITE_TWITTER_URL }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_EMAIL: ${{ secrets.VITE_ADMIN_EMAIL }}
          VITE_EMAILJS_SERVICE_ID: ${{ secrets.VITE_EMAILJS_SERVICE_ID }}
          VITE_EMAILJS_PUBLIC_KEY: ${{ secrets.VITE_EMAILJS_PUBLIC_KEY }}
          VITE_EMAILJS_TEMPLATE_ID: ${{ secrets.VITE_EMAILJS_TEMPLATE_ID }}
          VITE_DISCORD_CLIENT_ID: ${{ secrets.VITE_DISCORD_CLIENT_ID }}
          VITE_ADMIN_DISCORD_ID: ${{ secrets.VITE_ADMIN_DISCORD_ID }}

      - name: 📄 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
