<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/logo.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <link rel="stylesheet" href="/src/style.css">
  
  <!-- SEO & Open Graph -->
  <title>로폴더 (RoFolder) | 프리미엄 로샵 & 디스코드 커뮤니티 플랫폼</title>
  <meta name="description" content="로블록스 유저를 위한 최적의 로샵 탐색 플랫폼, 로폴더(RoFolder)에서 검증된 커뮤니티와 서비스 혜택을 가장 스마트하게 찾아보세요." />
  <meta property="og:title" content="로폴더 (RoFolder) | 프리미엄 로샵 플랫폼" />
  <meta property="og:description" content="수많은 로샵 사이에서 원하는 제품과 서비스를 가장 스마트하게 찾아보세요." />
  <meta property="og:image" content="/logo.png" />
  <meta property="og:type" content="website" />
  <meta name="theme-color" content="#6366f1">
</head>

<body>
    <div class="custom-cursor"></div>
    <div class="cursor-follower"></div>
    
    <div id="app"></div>

    <!-- 모달 시스템 -->
    <div id="modal-container" class="modal-overlay hidden">
      <div id="modal-content" class="modal-box glass">
        <!-- 동적으로 내용이 채워짐 -->
      </div>
    </div>

    <!-- 상세 모달 컨테이너 -->
    <div id="detail-modal-container" class="modal-overlay hidden">
      <div id="detail-modal-content" class="modal-box glass">
        <!-- 상세 모달 내용이 동적으로 채워짐 -->
      </div>
    </div>

    <!-- 등록 모달 컨테이너 -->
    <div id="register-modal-container" class="modal-overlay hidden">
      <div id="register-modal-content" class="modal-box glass">
        <!-- 등록 모달 내용이 동적으로 채워짐 -->
      </div>
    </div>

    <!-- 관리자 대시보드 -->
    <div id="admin-modal-container" class="modal-overlay hidden">
      <div id="admin-modal-content" class="modal-box glass admin-dashboard">
        <!-- 관리자 대시보드 내용이 동적으로 채워짐 -->
      </div>
    </div>

    <!-- 문의 모달 컨테이너 -->
    <div id="inquiry-modal-container" class="modal-overlay hidden">
      <div id="inquiry-modal-content" class="modal-box glass">
        <!-- 문의 모달 내용이 동적으로 채워짐 -->
      </div>
    </div>

    <!-- 푸터 컨테이너 -->
    <footer id="footer-container">
      <!-- 푸터 내용이 동적으로 채워짐 -->
    </footer>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
