<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ===== SEO 핵심 =====  -->
  <title>로폴더 (Rofolder) - 디스코드 서버 모음 커뮤니티 | 한국 최대 로샵 플랫폼</title>
  <meta name="description" content="로폴더(Rofolder)는 한국 최대 디스코드 서버 모음 커뮤니티입니다. 게임, 개발, 판매, RP, 커뮤니티 등 다양한 디스코드 서버를 한눈에 찾고 홍보하세요." />
  <meta name="keywords" content="로폴더, rofolder, 디스코드 서버, 디스코드 커뮤니티, 디스코드 서버 모음, 로샵, 한국 디스코드, 디코 서버 추천, 디스코드 게임 서버, 디스코드 RP 서버" />
  <meta name="robots" content="index, follow" />
  <meta name="author" content="RoFolder Team" />
  <link rel="canonical" href="https://rofolder.kro.kr/" />

  <!-- ===== 파비콘 및 CSS ===== -->
  <link rel="icon" type="image/png" href="/logo.png" />
  <link rel="apple-touch-icon" href="/logo.png" />
  <link rel="stylesheet" href="/src/style.css">

  <!-- ===== Schema.org 구조화 데이터 ===== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "로폴더 Rofolder",
    "alternateName": "로폴더",
    "url": "https://rofolder.kro.kr/",
    "description": "한국 최대 디스코드 서버 모음 커뮤니티 플랫폼",
    "inLanguage": "ko",
    "potentialAction": {
      "@type": "SearchAction",
      "target": "https://rofolder.kro.kr/?search={search_term_string}",
      "query-input": "required name=search_term_string"
    }
  }
  </script>

  <!-- ===== 성능: Google Fonts 최적화 ===== -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
    <div class="custom-cursor"></div>
    <div class="cursor-follower"></div>
    
    <div id="app"></div>

    <!-- 모달 시스템 -->
    <div id="modal-container" class="modal-overlay hidden">
      <div id="modal-content" class="modal-box glass">
      </div>
    </div>

    <!-- 상세 모달 컨테이너 -->
    <div id="detail-modal-container" class="modal-overlay hidden">
      <div id="detail-modal-content" class="modal-box glass">
      </div>
    </div>

    <!-- 등록 모달 컨테이너 -->
    <div id="register-modal-container" class="modal-overlay hidden">
      <div id="register-modal-content" class="modal-box glass">
      </div>
    </div>

    <!-- 관리자 대시보드 -->
    <div id="admin-modal-container" class="modal-overlay hidden">
      <div id="admin-modal-content" class="modal-box glass admin-dashboard">
      </div>
    </div>

    <!-- 문의 모달 컨테이너 -->
    <div id="inquiry-modal-container" class="modal-overlay hidden">
      <div id="inquiry-modal-content" class="modal-box glass">
      </div>
    </div>

    <!-- 푸터 컨테이너 -->
    <footer id="footer-container"></footer>

    <script type="module" src="/src/main.ts"></script>
</body>

</html>
